<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>京东家政预约</title>
  <base href="/">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f5f5f5; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .loading .icon { font-size: 48px; margin-bottom: 16px; }
    .loading .text { color: #666; font-size: 14px; }
    .loading .tip { color: #999; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="icon">🏠</div>
      <div class="text">京东家政预约系统</div>
      <div class="tip">前端文件加载中，请稍候...</div>
      <div class="tip" style="margin-top:16px;color:#e54635">如长时间未加载，请执行前端构建：<br>cd frontend-h5 &amp;&amp; npm install &amp;&amp; npm run build</div>
    </div>
  </div>
</body>
</html>
